<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chase Tag Scorer</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #bb86fc;
            --accent: #03dac6;
            --danger: #cf6679;
            --confirm: #ffb74d;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #setup-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .input-group { margin-bottom: 20px; width: 100%; max-width: 300px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--primary); font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 1rem;
        }

        .header {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: var(--card);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .team { text-align: center; }
        .team h2 { margin: 0; font-size: 1.1rem; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
        .score { font-size: 2.2rem; font-weight: bold; margin: 5px 0; }
        .role { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: bold; }

        .center-ctrl { text-align: center; padding: 0 10px; }
        #timer { font-family: monospace; font-size: 2.8rem; font-weight: bold; min-width: 110px; transition: color 0.2s; }
        .time-up { color: var(--danger); animation: shake 0.2s infinite; }

        #reset-btn { 
            background: none; border: 1px solid #444; color: #888; 
            padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; 
        }
        #reset-btn.confirming { border-color: var(--confirm); color: var(--confirm); font-weight: bold; }

        .status-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .round-info { font-size: 1.4rem; margin-bottom: 10px; opacity: 0.8; }
        #instruction { font-size: 1.1rem; color: var(--accent); margin: 20px; max-width: 85%; line-height: 1.4; font-weight: bold; }

        .controls {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            background: var(--card);
        }

        button {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.96); }
        #start-btn { background-color: #3700b3; }
        #tag-btn { background-color: var(--danger); }
        #tag-btn.confirming { background-color: var(--confirm); color: black; outline: 4px solid white; }
        #evade-btn { background-color: #037d71; }
        #evade-btn.confirming { background-color: var(--confirm); color: black; outline: 4px solid white; }
        #random-btn, #save-names-btn { background-color: var(--primary); color: black; }

        .hidden { display: none !important; }
        .sudden-death { color: var(--danger) !important; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <h1 style="color: var(--primary)">Chase Tag Setup</h1>
        <div class="input-group">
            <label>Team 1 Name</label>
            <input type="text" id="in-t1" value="Team A">
        </div>
        <div class="input-group">
            <label>Team 2 Name</label>
            <input type="text" id="in-t2" value="Team B">
        </div>
        <button id="save-names-btn" style="width: 100%; max-width: 300px;">Start Match</button>
    </div>

    <div class="header">
        <div class="team">
            <h2 id="t1-display-name">Team A</h2>
            <div class="score" id="t1-score">0</div>
            <div class="role" id="t1-role">-</div>
        </div>
        <div class="center-ctrl">
            <div id="timer">20.0</div>
            <button id="reset-btn">RESET MATCH</button>
        </div>
        <div class="team">
            <h2 id="t2-display-name">Team B</h2>
            <div class="score" id="t2-score">0</div>
            <div class="role" id="t2-role">-</div>
        </div>
    </div>

    <div class="status-area">
        <div class="round-info" id="round-display">Round 1/16</div>
        <div id="instruction">Assign roles to begin</div>
        <button id="random-btn">Assign Random Roles</button>
    </div>

    <div class="controls">
        <button id="start-btn" class="hidden">START (Space)</button>
        <button id="tag-btn" class="hidden">TAG (T)</button>
        <button id="evade-btn" class="hidden">EVADE (E)</button>
    </div>

    <script>
        let gameState = {
            t1Name: "Team A", t2Name: "Team B",
            t1Score: 0, t2Score: 0,
            t1Role: '', t2Role: '',
            round: 1, maxRounds: 16,
            isSuddenDeath: false, sdTimeRequired: 0, sdStage: 1,
            timeLeft: 20.0, isRunning: false, isTimeUp: false, startTime: null, rolesAssigned: false
        };

        let confirmTimeout = null;
        let activeConfirmType = null; 

        const timerEl = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const tagBtn = document.getElementById('tag-btn');
        const evadeBtn = document.getElementById('evade-btn');
        const resetBtn = document.getElementById('reset-btn');
        const randomBtn = document.getElementById('random-btn');
        const instr = document.getElementById('instruction');

        document.getElementById('save-names-btn').onclick = () => {
            gameState.t1Name = document.getElementById('in-t1').value || "Team A";
            gameState.t2Name = document.getElementById('in-t2').value || "Team B";
            document.getElementById('t1-display-name').innerText = gameState.t1Name;
            document.getElementById('t2-display-name').innerText = gameState.t2Name;
            document.getElementById('setup-overlay').classList.add('hidden');
        };

        function assignRandom() {
            const isT1Chaser = Math.random() > 0.5;
            assignRoles(isT1Chaser);
            gameState.rolesAssigned = true;
            randomBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            instr.innerText = "Roles Assigned.";
        }

        function assignRoles(isT1Chaser) {
            gameState.t1Role = isT1Chaser ? 'Chaser' : 'Evader';
            gameState.t2Role = isT1Chaser ? 'Evader' : 'Chaser';
            updateUI();
        }

        function updateUI() {
            document.getElementById('t1-score').innerText = gameState.t1Score;
            document.getElementById('t2-score').innerText = gameState.t2Score;
            document.getElementById('t1-role').innerText = gameState.t1Role;
            document.getElementById('t2-role').innerText = gameState.t2Role;
            if(gameState.isSuddenDeath) {
                document.getElementById('round-display').innerText = "SUDDEN DEATH";
            } else {
                document.getElementById('round-display').innerText = `Round ${gameState.round}/${gameState.maxRounds}`;
            }
        }

        function startChase() {
            if (!gameState.rolesAssigned || gameState.isRunning) return;
            clearConfirmation();
            gameState.isRunning = true;
            gameState.isTimeUp = false;
            timerEl.classList.remove('time-up');
            gameState.startTime = performance.now();
            startBtn.classList.add('hidden');
            tagBtn.classList.remove('hidden');
            evadeBtn.classList.remove('hidden');
            requestAnimationFrame(tick);
        }

        function tick() {
            if (!gameState.isRunning) return;
            const now = performance.now();
            const elapsed = (now - gameState.startTime) / 1000;
            const limit = (gameState.isSuddenDeath && gameState.sdStage === 2) ? gameState.sdTimeRequired : 20.0;
            
            gameState.timeLeft = Math.max(0, limit - elapsed);
            timerEl.innerText = gameState.timeLeft.toFixed(1);
            
            if (gameState.timeLeft <= 0) {
                // DO NOT END THE GAME AUTOMATICALLY
                // Just update visual state
                gameState.isTimeUp = true;
                timerEl.classList.add('time-up');
                timerEl.innerText = "0.0";
                instr.innerText = "TIME UP! Manual confirmation required.";
                // We keep requestAnimationFrame running or just stop the loop? 
                // Stopping the loop preserves the 0.0 display.
                return; 
            }
            requestAnimationFrame(tick);
        }

        function handleAction(type) {
            // Logic only works if game was started
            if (!gameState.isRunning && type !== 'reset') return;
            
            if (activeConfirmType === type) {
                clearConfirmation();
                if (type === 'reset') location.reload();
                else finalizeEndChase(type);
            } else {
                clearConfirmation();
                activeConfirmType = type;
                if (type === 'tag') {
                    tagBtn.innerText = "CONFIRM TAG?";
                    tagBtn.classList.add('confirming');
                } else if (type === 'evade') {
                    evadeBtn.innerText = "CONFIRM EVADE?";
                    evadeBtn.classList.add('confirming');
                } else if (type === 'reset') {
                    resetBtn.innerText = "SURE?";
                    resetBtn.classList.add('confirming');
                }
                confirmTimeout = setTimeout(clearConfirmation, 2500);
            }
        }

        function clearConfirmation() {
            clearTimeout(confirmTimeout);
            activeConfirmType = null;
            tagBtn.innerText = "TAG (T)";
            tagBtn.classList.remove('confirming');
            evadeBtn.innerText = "EVADE (E)";
            evadeBtn.classList.remove('confirming');
            resetBtn.innerText = "RESET MATCH";
            resetBtn.classList.remove('confirming');
        }

        function finalizeEndChase(result) {
            gameState.isRunning = false;
            timerEl.classList.remove('time-up');
            if (gameState.isSuddenDeath) handleSuddenDeathLogic(result);
            else handleStandardLogic(result);
        }

        function handleStandardLogic(result) {
            if (result === 'evade') {
                if (gameState.t1Role === 'Evader') gameState.t1Score++;
                else gameState.t2Score++;
                instr.innerText = "Point Awarded.";
            } else {
                assignRoles(gameState.t1Role !== 'Chaser');
                instr.innerText = "Tagged. Roles Swapped.";
            }
            gameState.round++;
            if (gameState.round > gameState.maxRounds) checkWinner();
            else resetTimer();
        }

        function handleSuddenDeathLogic(result) {
            if (gameState.sdStage === 1) {
                let currentEvader = gameState.t1Role === 'Evader' ? gameState.t1Name : gameState.t2Name;
                let time = prompt(`${currentEvader} time:`, gameState.isTimeUp ? "20.0" : (20 - gameState.timeLeft).toFixed(1));
                gameState.sdTimeRequired = parseFloat(time) || 0;
                gameState.sdStage = 2;
                assignRoles(gameState.t1Role !== 'Chaser');
                instr.innerText = `Target: Survive > ${gameState.sdTimeRequired}s`;
                resetTimer(gameState.sdTimeRequired);
            } else {
                const winner = (result === 'evade') ? 
                    (gameState.t1Role === 'Evader' ? gameState.t1Name : gameState.t2Name) : 
                    (gameState.t1Role === 'Chaser' ? gameState.t1Name : gameState.t2Name);
                instr.innerText = `${winner} wins match!`;
                tagBtn.classList.add('hidden'); evadeBtn.classList.add('hidden');
            }
        }

        function checkWinner() {
            if (gameState.t1Score === gameState.t2Score) {
                gameState.isSuddenDeath = true;
                instr.innerText = "TIE! Sudden Death.";
                resetTimer();
            } else {
                const winner = gameState.t1Score > gameState.t2Score ? gameState.t1Name : gameState.t2Name;
                instr.innerText = `${winner.toUpperCase()} WINS!`;
                startBtn.classList.add('hidden'); tagBtn.classList.add('hidden'); evadeBtn.classList.add('hidden');
            }
        }

        function resetTimer(customTime = 20.0) {
            gameState.timeLeft = customTime;
            timerEl.innerText = customTime.toFixed(1);
            startBtn.classList.remove('hidden'); tagBtn.classList.add('hidden'); evadeBtn.classList.add('hidden');
            updateUI();
        }

        randomBtn.onclick = assignRandom;
        startBtn.onclick = startChase;
        tagBtn.onclick = () => handleAction('tag');
        evadeBtn.onclick = () => handleAction('evade');
        resetBtn.onclick = () => handleAction('reset');

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('setup-overlay').classList.contains('hidden')) {
                const key = e.key.toLowerCase();
                if (key === ' ') { 
                    e.preventDefault(); 
                    if (!gameState.rolesAssigned) assignRandom(); 
                    else if (!gameState.isRunning) startChase(); 
                }
                if (key === 't') handleAction('tag');
                if (key === 'e') handleAction('evade');
                if (key === 'r') handleAction('reset');
            }
        });
    </script>
</body>
</html>
